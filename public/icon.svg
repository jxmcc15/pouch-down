<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5e6ad2"/>
      <stop offset="1" stop-color="#2f2a6b"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9cffc"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0a0a0f"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)" opacity="0.22"/>
  <rect x="17" y="17" width="478" height="478" rx="111" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
  <!-- descending steps: the taper -->
  <path d="M118 178 h72 v56 h72 v56 h72 v56 h60" fill="none" stroke="url(#arrow)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arrowhead down -->
  <path d="M394 322 v46 m0 0 l-30 -30 m30 30 l30 -30" fill="none" stroke="#34d399" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
